name: CI

# Catches regressions in extension wiring before they hit production:
#   1. typecheck — every engine/index.ts must compile against the SDK
#   2. validate-migrations — getMigrations() return list must match
#      the *.sql files actually present in migrations/ on disk.
#      A mismatch means RLS / schema changes silently skipped at install.
#
# Triggered on every PR + push so a broken-link migration list can't
# land on main.

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck + validate migrations
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The extensions repo's tsconfig path-resolves `@zveltio/sdk` via
      # `../zveltio/packages/sdk/src/...`. That file in turn imports
      # `kysely`, `hono`, and the rest of the engine's peer deps —
      # which only resolve through the ENGINE repo's `node_modules/`.
      # So we need both: the engine repo as a sibling AND its deps
      # installed. actions/checkout refuses paths outside the
      # workspace, so the sibling clone uses plain `git clone`.
      - name: Clone engine repo as sibling
        run: git clone --depth=1 https://github.com/zveltio-devs/zveltio.git ../zveltio

      - name: Install extension deps
        run: bun install --frozen-lockfile

      - name: Install engine deps (so SDK source types resolve kysely/hono/etc.)
        # No --frozen-lockfile here: this is a transient clone, the
        # extensions repo doesn't own zveltio's bun.lock, and the
        # engine repo's own CI already enforces lockfile freshness.
        run: cd ../zveltio && bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Validate migration paths
        # Every engine/index.ts's getMigrations() must return paths
        # that actually exist on disk. A drift here means migrations
        # silently skipped at extension install / enable.
        run: bun scripts/validate-migration-paths.ts

      - name: Verify packed bundles match manifest engineSha256
        # Drift between manifest.integrity.engineSha256 and the committed
        # engine/index.js bytes is what tripped the marketplace pipeline
        # repeatedly during the alpha cycle (autocrlf, biome format,
        # sync-time re-bundles, etc). Refuse PRs that contain a packed
        # extension whose bundle hash doesn't match the manifest.
        # Engine-less extensions are skipped (engine/index.ts absent).
        run: |
          set -e
          DRIFT=0
          for m in $(find . -name manifest.json -not -path '*/node_modules/*' -not -path '*/.git/*' -not -path '*/scripts/*'); do
            d=$(dirname "$m")
            bundle="$d/engine/index.js"
            entry="$d/engine/index.ts"
            [ -f "$entry" ] || continue
            if [ ! -f "$bundle" ]; then
              name=$(node -e "console.log(require('./$m').name)")
              echo "::error::$name: engine/index.ts exists but engine/index.js is missing — run \`zveltio extension pack --dir $d\`"
              DRIFT=1
              continue
            fi
            actual=$(sha256sum "$bundle" | awk '{print $1}')
            declared=$(node -e "const m=require('./$m'); console.log(m.integrity?.engineSha256 ?? '')")
            if [ -z "$declared" ]; then
              echo "::error::$m: bundle present but manifest.integrity.engineSha256 not declared"
              DRIFT=1
              continue
            fi
            if [ "$actual" != "$declared" ]; then
              echo "::error::$m: bundle hash $actual does not match manifest engineSha256 $declared — re-pack required"
              DRIFT=1
            fi
          done
          if [ $DRIFT -ne 0 ]; then
            echo "::error::Hash drift detected. Run \`bun /path/to/zveltio/packages/cli/src/index.ts extension pack --dir <ext>\` for each affected extension and commit the result."
            exit 1
          fi
          echo "All committed bundles match their declared engineSha256."

      - name: Validate declarative (SDUI) page schemas
        # Every extension that ships studio/pages[].schema is run through
        # `zveltio extension validate`, which checks the schema's endpoints
        # resolve to routes the engine actually serves and stay inside the
        # extension's own (or a declared dependency's) /ext/<name>/ namespace.
        # This is the gate that catches the beta.11 class where a wrong
        # dataSource/endpoint shipped and rendered an empty table.
        run: |
          set -e
          CLI=../zveltio/packages/cli/src/index.ts
          FAIL=0
          for m in $(find . -name manifest.json -not -path '*/node_modules/*' -not -path '*/.git/*' -not -path '*/scripts/*'); do
            d=$(dirname "$m")
            has=$(node -e "const m=require('./$m'); const p=(m.studio&&m.studio.pages)||[]; process.stdout.write(p.some(x=>x&&x.schema)?'1':'')")
            [ -n "$has" ] || continue
            echo "── validate $d"
            if ! bun "$CLI" extension validate --dir "$d" --first-party; then FAIL=1; fi
          done
          if [ $FAIL -ne 0 ]; then
            echo "::error::One or more declarative schemas failed validation (see above)."
            exit 1
          fi
          echo "All declarative schemas valid."
