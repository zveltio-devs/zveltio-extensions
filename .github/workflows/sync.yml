name: Sync to Registry

on:
  push:
    branches: [main, master]
  # Also runs when a version tag is pushed (e.g. after zveltio releases v1.x.x)
  repository_dispatch:
    types: [engine-released]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (needed to bundle extension engine code)
        run: bun install

      - name: Determine version
        id: version
        # Read client_payload via env so a malicious dispatch payload cannot
        # break out of the shell context (GitHub Actions script-injection
        # CWE-78). Validate the value against a strict semver regex before
        # emitting it as a step output.
        env:
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
        run: |
          if [ -n "$DISPATCH_VERSION" ]; then
            if ! echo "$DISPATCH_VERSION" | grep -Eq '^[0-9]+(\.[0-9]+){0,2}(-[0-9A-Za-z.-]+)?$'; then
              echo "::error::Refusing unsafe DISPATCH_VERSION value (must match semver-like pattern)."
              exit 1
            fi
            echo "version=$DISPATCH_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync official extensions to registry
        # Pass the version through env, not as an inline command argument —
        # ${{ ... }} expansion happens before the shell runs, which lets a
        # crafted value land unquoted in the command line otherwise.
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_SYNC_TOKEN: ${{ secrets.REGISTRY_SYNC_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: node scripts/sync-to-registry.mjs --version "$VERSION"
