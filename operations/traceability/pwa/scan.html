<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Zveltio Scan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #111; color: #fff; min-height: 100vh; }
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    /* Header */
    #header { background: #1a1a2e; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
    #header h1 { font-size: 17px; font-weight: 700; }
    #mode-toggle { display: flex; gap: 6px; }
    .mode-btn { padding: 5px 12px; border-radius: 20px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: #334155; color: #94a3b8; }
    .mode-btn.active { background: #3b82f6; color: #fff; }
    .mode-btn.dispatch-active { background: #f59e0b; color: #1a1a2e; }

    /* Scanner */
    #scanner-container { flex: 1; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto; }
    #status { padding: 14px 16px; text-align: center; font-size: 14px; opacity: 0.7; }

    /* Card */
    .card { background: #1e293b; margin: 10px 12px; border-radius: 12px; padding: 14px; }
    .card.hidden { display: none; }
    .product-name { font-size: 19px; font-weight: 700; margin-bottom: 4px; }
    .lot-number { font-size: 12px; color: #94a3b8; font-family: monospace; margin-bottom: 10px; }
    .row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #334155; font-size: 13px; }
    .row:last-of-type { border-bottom: none; }
    .lbl { color: #94a3b8; }
    .danger { color: #ef4444; font-weight: 700; }
    .warn { color: #f59e0b; }
    .ok { color: #22c55e; }

    /* Forms */
    .field { margin-top: 12px; }
    .field label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .field input, .field select { width: 100%; padding: 11px; border: 2px solid #334155; border-radius: 8px; background: #0f172a; color: #fff; font-size: 16px; }
    .field input[type=number] { text-align: center; font-size: 20px; }

    /* Buttons */
    .btn { width: 100%; padding: 13px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 15px; margin-top: 8px; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-success { background: #22c55e; color: #fff; }
    .btn-warning { background: #f59e0b; color: #1a1a2e; }
    .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; font-size: 13px; padding: 9px; margin-top: 6px; }
    .btn:disabled { background: #374151; cursor: not-allowed; }

    /* Alerts */
    .alert { padding: 12px 14px; border-radius: 8px; margin: 10px 12px; font-size: 13px; }
    .alert-error { background: #450a0a; color: #fca5a5; }
    .alert-success { background: #052e16; color: #86efac; text-align: center; }
    .alert-success .check { font-size: 40px; margin-bottom: 6px; }
    .alert-warning { background: #451a03; color: #fcd34d; }

    /* Dispatch pending badge */
    .dispatch-badge { background: #f59e0b22; border: 1px solid #f59e0b66; border-radius: 8px; padding: 10px 12px; margin-top: 10px; font-size: 13px; }
    .dispatch-badge strong { color: #fcd34d; display: block; margin-bottom: 2px; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <span>📦 <span id="header-title">Zveltio Scan</span></span>
    <div id="mode-toggle">
      <button class="mode-btn active" id="btn-consume" onclick="setMode('consume')">Consum</button>
      <button class="mode-btn" id="btn-dispatch" onclick="setMode('dispatch')">Expediere</button>
    </div>
  </div>

  <div id="scanner-container">
    <div id="reader"></div>
    <div id="status">Inițializare cameră...</div>
  </div>

  <div id="error-box" class="alert alert-error" style="display:none"></div>

  <div id="success-box" class="alert alert-success" style="display:none">
    <div class="check">✅</div>
    <div id="success-text"></div>
    <button class="btn btn-ghost" onclick="resetScan()" style="margin-top:10px">Scanează din nou</button>
  </div>

  <!-- LOT INFO CARD -->
  <div id="lot-card" class="card hidden">
    <div class="product-name" id="pc-name"></div>
    <div class="lot-number" id="pc-lot"></div>
    <div class="row"><span class="lbl">Furnizor</span><span id="pc-supplier"></span></div>
    <div class="row"><span class="lbl">Disponibil</span><span id="pc-qty"></span></div>
    <div class="row"><span class="lbl">Valabilitate</span><span id="pc-bbd"></span></div>
    <div class="row"><span class="lbl">Locație</span><span id="pc-loc"></span></div>

    <!-- CONSUME MODE -->
    <div id="consume-section">
      <div class="field">
        <label>Ordin de producție</label>
        <select id="order-select"><option value="">Selectați ordinul...</option></select>
      </div>
      <div class="field">
        <label>Cantitate de consumat</label>
        <input type="number" id="qty-consume" min="0.001" step="0.001" placeholder="0.000" />
      </div>
      <button class="btn btn-success" onclick="confirmConsume()">✓ Confirmă consum</button>
    </div>

    <!-- DISPATCH MODE -->
    <div id="dispatch-section" style="display:none">
      <div id="pending-dispatch-info" class="dispatch-badge" style="display:none">
        <strong id="pd-customer"></strong>
        <span id="pd-invoice"></span> · Cant. facturată: <span id="pd-qty-inv"></span>
      </div>

      <div class="field" style="margin-top:12px">
        <label>Client</label>
        <input type="text" id="dispatch-customer" placeholder="Denumire client" />
      </div>
      <div class="field">
        <label>Nr. factură / aviz (opțional)</label>
        <input type="text" id="dispatch-invoice" placeholder="ex: INV-00123" />
      </div>
      <div class="field">
        <label>Cantitate expediată</label>
        <input type="number" id="qty-dispatch" min="0.001" step="0.001" placeholder="0.000" />
      </div>
      <button class="btn btn-warning" onclick="confirmDispatch()">📦 Confirmă expedierea</button>
    </div>

    <button class="btn btn-ghost" onclick="resetScan()">← Scanează alt lot</button>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  const API = '/ext/operations/traceability';
  let mode = 'consume'; // 'consume' | 'dispatch'
  let currentLot = null;
  let pendingDispatch = null;
  let scanner = null;

  function setMode(m) {
    mode = m;
    document.getElementById('btn-consume').className = 'mode-btn' + (m === 'consume' ? ' active' : '');
    document.getElementById('btn-dispatch').className = 'mode-btn' + (m === 'dispatch' ? ' dispatch-active' : '');
    document.getElementById('header-title').textContent = m === 'consume' ? 'Scan Consum' : 'Scan Expediere';
    resetScan();
  }

  function isUUID(s) {
    return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s);
  }

  async function onScan(lotId) {
    if (currentLot) return;
    setStatus('Se verifică lotul...');
    try {
      const res = await fetch(`${API}/scan/lot/${encodeURIComponent(lotId)}`, { credentials: 'include' });
      if (res.status === 401) { window.location.href = '/login'; return; }
      const lot = await res.json();
      if (!res.ok) { showError(lot.error || 'Lot indisponibil'); return; }

      currentLot = { id: lotId, ...lot };
      showLotCard(lot);
      if (navigator.vibrate) navigator.vibrate(200);

      if (mode === 'consume') await loadOrders();
      if (mode === 'dispatch') await loadPendingDispatch(lotId, lot);
    } catch (e) {
      showError('Eroare rețea: ' + e.message);
    }
  }

  function showLotCard(lot) {
    document.getElementById('pc-name').textContent = lot.item_name || '?';
    document.getElementById('pc-lot').textContent = 'LOT: ' + (lot.lot_number || '?');
    document.getElementById('pc-supplier').textContent = lot.supplier_name || '—';
    document.getElementById('pc-qty').textContent = `${lot.quantity_remaining} ${lot.unit}`;

    const bbd = lot.best_before_date;
    const bbdEl = document.getElementById('pc-bbd');
    if (bbd) {
      const days = Math.ceil((new Date(bbd) - Date.now()) / 86400000);
      bbdEl.textContent = bbd;
      bbdEl.className = days <= 3 ? 'danger' : days <= 7 ? 'warn' : '';
    } else { bbdEl.textContent = '—'; }

    const loc = [lot.warehouse, lot.row, lot.shelf].filter(Boolean).join(' / ');
    document.getElementById('pc-loc').textContent = loc || '—';

    document.getElementById('lot-card').classList.remove('hidden');
    document.getElementById('scanner-container').style.display = 'none';
    document.getElementById('consume-section').style.display = mode === 'consume' ? '' : 'none';
    document.getElementById('dispatch-section').style.display = mode === 'dispatch' ? '' : 'none';
    document.getElementById('qty-consume').max = lot.quantity_remaining;
    document.getElementById('qty-dispatch').max = lot.quantity_remaining;
    showError('');
  }

  async function loadOrders() {
    const res = await fetch(`${API}/production?status=in_progress&limit=50`, { credentials: 'include' });
    const data = await res.json();
    const sel = document.getElementById('order-select');
    sel.innerHTML = '<option value="">Selectați ordinul...</option>';
    (data.data || []).forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.id;
      opt.textContent = `${o.order_number} — ${o.output_item_name || '?'}`;
      sel.appendChild(opt);
    });
  }

  async function loadPendingDispatch(lotId, lot) {
    pendingDispatch = null;
    try {
      const res = await fetch(`${API}/dispatches?status=pending&lot_id=${encodeURIComponent(lotId)}`, { credentials: 'include' });
      const data = await res.json();
      const pd = (data.data || [])[0]; // primul dispatch pending pentru acest lot
      if (pd) {
        pendingDispatch = pd;
        document.getElementById('pd-customer').textContent = pd.customer_name || '?';
        document.getElementById('pd-invoice').textContent = pd.invoice_number ? `Factură ${pd.invoice_number}` : 'Fără factură';
        document.getElementById('pd-qty-inv').textContent = `${pd.quantity_invoiced} ${pd.unit}`;
        document.getElementById('pending-dispatch-info').style.display = '';
        document.getElementById('dispatch-customer').value = pd.customer_name || '';
        document.getElementById('dispatch-invoice').value = pd.invoice_number || '';
        document.getElementById('qty-dispatch').value = pd.quantity_invoiced || '';
      } else {
        document.getElementById('pending-dispatch-info').style.display = 'none';
      }
    } catch {}
  }

  async function confirmConsume() {
    const qty = parseFloat(document.getElementById('qty-consume').value);
    const orderId = document.getElementById('order-select').value;
    if (!qty || qty <= 0) { showError('Introduceți cantitatea'); return; }
    if (!orderId) { showError('Selectați ordinul de producție'); return; }

    disableBtn('btn-success-consume');
    try {
      const res = await fetch(`${API}/scan/consume`, {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lot_id: currentLot.id, quantity_used: qty, production_order_id: orderId }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Eroare'); return; }
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      showSuccess(`${qty} ${currentLot.unit} — ${currentLot.item_name} consumat cu succes!`);
    } catch (e) { showError('Eroare: ' + e.message); }
  }

  async function confirmDispatch() {
    const qty = parseFloat(document.getElementById('qty-dispatch').value);
    const customer = document.getElementById('dispatch-customer').value.trim();
    const invoice = document.getElementById('dispatch-invoice').value.trim();
    if (!qty || qty <= 0) { showError('Introduceți cantitatea'); return; }
    if (!customer) { showError('Introduceți numele clientului'); return; }

    try {
      let res;
      if (pendingDispatch) {
        // Confirm existing pending dispatch
        res = await fetch(`${API}/dispatches/${pendingDispatch.id}/confirm`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ quantity_dispatched: qty }),
        });
      } else {
        // Direct dispatch
        res = await fetch(`${API}/dispatches/direct`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            lot_id: currentLot.id,
            quantity_dispatched: qty,
            unit: currentLot.unit,
            customer_name: customer,
            invoice_number: invoice || undefined,
          }),
        });
      }
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Eroare'); return; }
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      showSuccess(`${qty} ${currentLot.unit} expediat(ă) către ${customer}.`);
    } catch (e) { showError('Eroare: ' + e.message); }
  }

  function resetScan() {
    currentLot = null;
    pendingDispatch = null;
    document.getElementById('lot-card').classList.add('hidden');
    document.getElementById('success-box').style.display = 'none';
    document.getElementById('scanner-container').style.display = '';
    document.getElementById('qty-consume').value = '';
    document.getElementById('qty-dispatch').value = '';
    document.getElementById('dispatch-customer').value = '';
    document.getElementById('dispatch-invoice').value = '';
    document.getElementById('pending-dispatch-info').style.display = 'none';
    showError('');
    if (scanner) scanner.resume();
  }

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.textContent = msg; el.style.display = msg ? '' : 'none';
  }
  function showSuccess(msg) {
    document.getElementById('lot-card').classList.add('hidden');
    document.getElementById('success-text').textContent = msg;
    document.getElementById('success-box').style.display = '';
  }
  function setStatus(msg) { document.getElementById('status').textContent = msg; }

  window.addEventListener('DOMContentLoaded', async () => {
    // Verify session before initializing scanner
    const authCheck = await fetch(`${API}/me`, { credentials: 'include' });
    if (authCheck.status === 401) { window.location.href = '/login'; return; }

    scanner = new Html5QrcodeScanner('reader', { fps: 10, qrbox: { width: 260, height: 260 }, aspectRatio: 1 }, false);
    scanner.render(decodedText => {
      if (isUUID(decodedText) && !currentLot) onScan(decodedText);
    }, () => {});
    setStatus('Îndreptați camera spre QR-ul de pe etichetă');
  });
</script>
</body>
</html>
